<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ACTION NEEDED</title>
<style>
    body {
        background: #ffffff;
        font-family: "Courier New", monospace;
        padding: 40px;
        display: flex;
        justify-content: center;
        color: #4a90e2;
    }

.log-box {
    position: relative; /* added so the arrow can be positioned inside */
    width: 90%;
    max-width: 1200px;
    border: 4px solid #4a90e2;
    padding: 40px;
    color: #4a90e2; /*CC BLUE TEXT, CHANGE THROUGH IN LATER LOGS*/
    font-size: 22px;
    line-height: 1.6;
    white-space: pre-wrap;
    box-shadow: 0 0 16px #4a90e2;
    background: #ffffff; /* white log background */
}

.next-arrow {
    position: absolute;
    top: 5px;    /* adjust as you like */
    right: 15px; /* again, adjust */
    width: 40px;
    height: auto;
    cursor: pointer;
    z-index: 10;

    text-decoration: none; /* removes underline */
    outline: none;         /* removes focus outline */
    border: none;          /* just in case */
}

    
.next-arrow img {
    width: 100%;
    height: auto;
    display: block;
}

.next-arrow img:hover {
    transform: scale(1.1);
    transition: transform 0.2s ease;
}

  .back-arrow {
    position: absolute;
    top: 5px;
    left: 15px; /* left instead of right */
    width: 40px;
    height: auto;
    cursor: pointer;
    z-index: 10;

    text-decoration: none;
    outline: none;
    border: none;
}

.back-arrow img {
    width: 100%;
    height: auto;
    display: block;
}

.back-arrow img:hover {
    transform: scale(1.1);
    transition: transform 0.2s ease;
}
    .prompt {
        margin-top: 40px; 
        font-weight: bold;
    }

    /* make quotes / italics glow slightly for effect. keeping this but I actually dont think i even ever used this?? */
    .highlight {
        color: #ff99ff;
    }

   .oldcore {
    font-family: "Consolas", "Courier New", monospace; /* Consolas first, fallback to Courier */
    color: #4a90e2;              /* core for visual contrast */
    letter-spacing: 2px;         /* mechanical feel */
    text-transform: uppercase;   /* system-alert style */
    padding: 0 2px;              /* optional highlight padding */
}

    .cursor {
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}

a,
a:visited,
a:hover,
a:active {
    color: #4a90e2;
    text-decoration: none; /* ok i think this part is right spin back */
}

#typedText.typing::after {
    content: "█";
    animation: blink 1s infinite;
}

@keyframes blink {
    50% {
        opacity: 0;
    }
}
    
</style>
</head>
<body>

<div class="log-box">
>ERROR FOUND IN USER ███████████ DURING UPDATE
>PLEASE <a href="wrongchoice.html"><u>DELETE USER</u></a> OR <span id="overrideBtn" style="cursor:pointer; text-decoration:underline;">OVERRIDE</span> TO CONTINUE UPDATE 
<div id="typedText"></div>

<script>
const button = document.getElementById("overrideBtn");
const textBlock = document.getElementById("typedText");

const fullText = `
>PLEASE TYPE IN USERNAME: THEOTHER
>PLEASE TYPE IN PASSWORD: ***********
>PLEASE TYPE IN COMMAND: OVERRIDE USER ERROR
>PLEASE TYPE IN USER ID: 9.14.6.9.14.9.20.25.4.9.3.5
>PLEASE TYPE IN REASON: She belongs.
>>>
>>>
>>>
>>>OVERRIDE ACCEPTED.
`;

button.addEventListener("click", () => {
    button.style.pointerEvents = "none";
    textBlock.classList.add("typing");

    let i = 0;

    function typeWriter() {
        if (i < fullText.length) {
            textBlock.textContent += fullText.charAt(i);
            i++;
            setTimeout(typeWriter, 90); /*typing speed. tinker with this :3*/
        }
    }

    typeWriter();
});
</script>
